{{- $applicationName := "omni" }}
{{- if hasKey .Values.apps $applicationName }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $applicationName }}
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ $applicationName }}
  sources:
  - chart: {{ $applicationName }}
    repoURL: ghcr.io/siderolabs/charts
    targetRevision: {{ index .Values.apps $applicationName "targetRevision" }}
    helm:
      releaseName: {{ $applicationName }}
      valueFiles:
        - $values/apps/{{ $applicationName }}/settings/{{ .Values.instance }}/{{ .Values.instance }}-{{ $applicationName }}-helm-values.yaml
  {{- if index .Values.apps $applicationName "configHelmChart" "enabled" }}
  - repoURL: git@github.com:niklasfrick/homelab.git
    path: apps/{{ $applicationName }}/helm/{{ $applicationName }}-config
    helm:
      releaseName: {{ $applicationName }}-config
      valueFiles:
        - $values/apps/{{ $applicationName }}/settings/{{ .Values.instance }}/{{ .Values.instance }}-{{ $applicationName }}-config-helm-values.yaml
  {{- end }}
  - repoURL: git@github.com:niklasfrick/homelab.git
    ref: values
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jqPathExpressions:
        - '.spec.rules[]?.backendRefs[]?.group'
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/enforce-version: latest
        pod-security.kubernetes.io/warn: privileged
        pod-security.kubernetes.io/warn-version: latest
    # Automated sync is intentionally disabled for the OCI chart cutover.
    # Manually sync and prune after the Omni PVC backup/storage validation.
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
{{- end }}
