tempo:
  storage:
    trace:
      backend: s3
      s3:
        bucket: "zendo-tempo-traces"
        endpoint: "s3.bal.949x.net:9000"
        region: "bal"
        insecure: false
        forcepathstyle: true

  extraEnvFrom:
    - secretRef:
        name: minio-aistor-s3-bal-keys

tempoQuery:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 300Mi
    limits:
      memory: 600Mi
