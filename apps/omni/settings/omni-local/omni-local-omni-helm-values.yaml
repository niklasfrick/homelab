config:
  account:
    id: 8b965a24-0dce-4481-840f-b5548ea1c139
    name: "Omni"
  auth:
    auth0:
      enabled: true
      clientID: "2fx0Rm2WxCDy4N4QCRuGssy0o2sXpsZi"
      domain: "949x.eu.auth0.com"
    initialUsers:
      - "niklas.frick@pm.me"
  etcdBackup:
    # The chart defaults localPath to /data/etcd-backup; Omni rejects localPath
    # when S3 backups are enabled, so explicitly unset it in the merged config.
    localPath: null
    s3Enabled: true
  features:
    enableBreakGlassConfigs: true
  services:
    api:
      advertisedURL: https://omni.apps-omni.949x.net
    kubernetesProxy:
      advertisedURL: https://kubernetes.omni.apps-omni.949x.net
    machineAPI:
      advertisedURL: https://siderolink.omni.apps-omni.949x.net
    siderolink:
      joinTokensMode: legacyAllowed
      wireGuard:
        advertisedEndpoint: "10.96.10.101:30180"
    workloadProxy:
      enabled: true
      subdomain: proxy

etcdEncryptionKey:
  existingSecret: etcd-gpg-asc-key

# The legacy chart passed --account-id="{{ uuid }}" as a Kubernetes arg,
# so Omni persisted resources under the literal quoted account ID.
args:
  - --account-id="8b965a24-0dce-4481-840f-b5548ea1c139"

gatewayApi:
  ui:
    enabled: true
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: internal-gateway
        namespace: kube-system
        sectionName: https
    hostnames:
      - omni.apps-omni.949x.net
  kubernetesProxy:
    enabled: true
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: internal-gateway
        namespace: kube-system
        sectionName: https-omni-subdomain
    hostnames:
      - kubernetes.omni.apps-omni.949x.net
  siderolinkApi:
    enabled: true
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: internal-gateway
        namespace: kube-system
        sectionName: https-omni-subdomain
    hostnames:
      - siderolink.omni.apps-omni.949x.net

resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    memory: 400Mi

metrics:
  enabled: true
  serviceMonitor:
    enabled: true

persistence:
  enabled: true
  # Omni's embedded etcd and SQLite storage are sensitive to NFS semantics.
  storageClassName: "local-path"

extraObjects:
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: etcd-gpg-asc-key
      namespace: omni
    spec:
      refreshInterval: 1h
      secretStoreRef:
        name: infisical-secret-store
        kind: ClusterSecretStore
      target:
        name: etcd-gpg-asc-key
        creationPolicy: Owner
      data:
        - secretKey: omni.asc
          remoteRef:
            conversionStrategy: Default
            decodingStrategy: None
            metadataPolicy: None
            key: /omni/etcd/OMNI_GPG_ASC_KEY
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: omni-workload-proxy
      namespace: omni
    spec:
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: internal-gateway
          namespace: kube-system
          sectionName: https-workload-proxy
      hostnames:
        - "*.proxy.apps-omni.949x.net"
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: omni
              port: 8080
              weight: 1
