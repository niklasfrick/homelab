config:
  account:
    id: 8b965a24-0dce-4481-840f-b5548ea1c139
    name: "Omni"
  auth:
    auth0:
      enabled: true
      clientID: "2fx0Rm2WxCDy4N4QCRuGssy0o2sXpsZi"
      domain: "949x.eu.auth0.com"
    initialUsers:
      - "niklas.frick@pm.me"
  features:
    enableBreakGlassConfigs: true
  services:
    api:
      advertisedURL: https://omni.apps-omni.949x.net
    kubernetesProxy:
      advertisedURL: https://kubernetes.omni.apps-omni.949x.net
    machineAPI:
      advertisedURL: https://siderolink.omni.apps-omni.949x.net
    siderolink:
      wireGuard:
        advertisedEndpoint: "10.96.10.101:30180"
    workloadProxy:
      enabled: true
      subdomain: proxy

etcdEncryptionKey:
  existingSecret: etcd-gpg-asc-key

gatewayApi:
  ui:
    enabled: true
    parentRefs:
      - name: internal-gateway
        namespace: kube-system
        sectionName: https
    hostnames:
      - omni.apps-omni.949x.net
  kubernetesProxy:
    enabled: true
    parentRefs:
      - name: internal-gateway
        namespace: kube-system
        sectionName: https-omni-subdomain
    hostnames:
      - kubernetes.omni.apps-omni.949x.net
  siderolinkApi:
    enabled: true
    parentRefs:
      - name: internal-gateway
        namespace: kube-system
        sectionName: https-omni-subdomain
    hostnames:
      - siderolink.omni.apps-omni.949x.net

resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    memory: 400Mi

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
  rules:
    enabled: true

persistence:
  enabled: true
  # Keep the retained NFS class, but let the upstream chart create its default
  # PVC and use its default /data storage layout.
  storageClassName: "nfs-csi-retain"

initContainers:
  - name: verify-existing-omni-data
    image: busybox:1.37
    command:
      - sh
      - -ec
      - |
        test -d /data/etcd || {
          echo "Missing /data/etcd on the new Omni PVC; copy the old etcd database before starting Omni.";
          exit 1;
        }
        test -n "$(find /data/etcd -mindepth 1 -maxdepth 2 -print -quit)" || {
          echo "Empty /data/etcd on the new Omni PVC; copy the old etcd database before starting Omni.";
          exit 1;
        }
        test -f /data/secondary-storage/sqlite.db || {
          echo "Missing /data/secondary-storage/sqlite.db on the new Omni PVC; copy the old SQLite database before starting Omni.";
          exit 1;
        }
    volumeMounts:
      - name: data
        mountPath: /data

extraObjects:
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: etcd-gpg-asc-key
      namespace: omni
    spec:
      refreshInterval: 1h
      secretStoreRef:
        name: infisical-secret-store
        kind: ClusterSecretStore
      target:
        name: etcd-gpg-asc-key
        creationPolicy: Owner
      data:
        - secretKey: omni.asc
          remoteRef:
            key: /omni/etcd/OMNI_GPG_ASC_KEY
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: omni-workload-proxy
      namespace: omni
    spec:
      parentRefs:
        - name: internal-gateway
          namespace: kube-system
          sectionName: https-workload-proxy
      hostnames:
        - "*.proxy.apps-omni.949x.net"
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: omni
              port: 8080
