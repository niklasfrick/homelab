config:
  account:
    id: 8b965a24-0dce-4481-840f-b5548ea1c139
    name: "Omni"
  auth:
    auth0:
      enabled: true
      clientID: "2fx0Rm2WxCDy4N4QCRuGssy0o2sXpsZi"
      domain: "949x.eu.auth0.com"
    initialUsers:
      - "niklas.frick@pm.me"
  features:
    enableBreakGlassConfigs: true
  services:
    api:
      advertisedURL: https://omni.apps-omni.949x.net
    kubernetesProxy:
      advertisedURL: https://kubernetes.omni.apps-omni.949x.net
    machineAPI:
      advertisedURL: https://siderolink.omni.apps-omni.949x.net
    siderolink:
      joinTokensMode: legacyAllowed
      wireGuard:
        advertisedEndpoint: "10.96.10.101:30180"
    workloadProxy:
      enabled: true
      subdomain: proxy

etcdEncryptionKey:
  existingSecret: etcd-gpg-asc-key

# The legacy chart passed --account-id="{{ uuid }}" as a Kubernetes arg,
# so Omni persisted resources under the literal quoted account ID.
args:
  - --account-id="8b965a24-0dce-4481-840f-b5548ea1c139"

gatewayApi:
  ui:
    enabled: true
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: internal-gateway
        namespace: kube-system
        sectionName: https
    hostnames:
      - omni.apps-omni.949x.net
  kubernetesProxy:
    enabled: true
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: internal-gateway
        namespace: kube-system
        sectionName: https-omni-subdomain
    hostnames:
      - kubernetes.omni.apps-omni.949x.net
  siderolinkApi:
    enabled: true
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: internal-gateway
        namespace: kube-system
        sectionName: https-omni-subdomain
    hostnames:
      - siderolink.omni.apps-omni.949x.net

resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    memory: 400Mi

metrics:
  enabled: true
  serviceMonitor:
    enabled: true

persistence:
  enabled: true
  # Omni's embedded etcd and SQLite storage are sensitive to NFS semantics.
  storageClassName: "local-path"

initContainers:
  - name: migrate-legacy-storage
    image: busybox:1.36
    command:
      - sh
      - -ec
      - |
        mkdir -p /data/secondary-storage

        if [ ! -d /data/etcd/member ] && [ -d /legacy/etcd ]; then
          echo "Copying legacy etcd data into /data/etcd"
          rm -rf /data/etcd.migrating
          mkdir -p /data/etcd.migrating
          cp -a /legacy/etcd/. /data/etcd.migrating/
          rm -rf /data/etcd
          mv /data/etcd.migrating /data/etcd
        else
          echo "Skipping etcd copy; target already exists or legacy source is missing"
        fi

        if [ ! -f /data/secondary-storage/sqlite.db ] && [ -f /legacy/secondary-storage/sqlite.db ]; then
          echo "Copying legacy SQLite database into /data/secondary-storage/sqlite.db"
          cp -a /legacy/secondary-storage/sqlite.db /data/secondary-storage/sqlite.db.migrating
          mv /data/secondary-storage/sqlite.db.migrating /data/secondary-storage/sqlite.db
        else
          echo "Skipping SQLite copy; target already exists or legacy source is missing"
        fi
    volumeMounts:
      - name: data
        mountPath: /data
      - name: legacy-storage
        mountPath: /legacy
        readOnly: true

extraVolumes:
  - name: legacy-storage
    persistentVolumeClaim:
      claimName: omni-pvc

extraObjects:
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: etcd-gpg-asc-key
      namespace: omni
    spec:
      refreshInterval: 1h
      secretStoreRef:
        name: infisical-secret-store
        kind: ClusterSecretStore
      target:
        name: etcd-gpg-asc-key
        creationPolicy: Owner
      data:
        - secretKey: omni.asc
          remoteRef:
            conversionStrategy: Default
            decodingStrategy: None
            metadataPolicy: None
            key: /omni/etcd/OMNI_GPG_ASC_KEY
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: omni-workload-proxy
      namespace: omni
    spec:
      parentRefs:
        - name: internal-gateway
          namespace: kube-system
          sectionName: https-workload-proxy
      hostnames:
        - "*.proxy.apps-omni.949x.net"
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: omni
              port: 8080
