# Use DRA-managed GPU access; pairs with intel-gpu-resource-driver.
gpuAccess: dra

# Require the NFD Intel-GPU label (set by the rule that ships with
# intel-gpu-resource-driver) AND exclude t3s-zendo-w4. That node carries
# a Coffee Lake-S UHD 630 (PCI 8086:3e92, class 0380, Gen9.5) which the
# xpumd v2 Level Zero Sysman backend does not support; init fails with
# ERROR_UNINITIALIZED and the pod crashloops. xpumd v2 targets Arc /
# Flex / newer iGPUs (Alder Lake-N and up). Revisit if Intel reinstates
# Gen9.5 Sysman support upstream.
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: intel.feature.node.kubernetes.io/gpu
              operator: In
              values: ["true"]
            - key: kubernetes.io/hostname
              operator: NotIn
              values: ["t3s-zendo-w4"]

# Add the prometheus exporter to the metrics pipeline. The chart
# defaults to exporters=[intelxpuinfo] (unix socket only); the
# Prometheus HTTP endpoint is not served unless `prometheus` is added
# here. See chart README "Optional functionality" section.
config:
  service:
    pipelines:
      metrics:
        exporters:
          - intelxpuinfo
          - prometheus

# Wire metrics into kube-prometheus-stack. serviceMonitorSelector on
# zendo is {} with selectorNilUsesHelmValues=false, so the release label
# below is informational only; Prometheus will still pick up the
# ServiceMonitor regardless of label.
prometheus:
  monitor: true
  release: kube-prometheus-stack
