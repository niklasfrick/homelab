                cdi_spec_dirs = ["/var/cdi/static", "/var/cdi/dynamic"]
            op: create
            path: /etc/cri/conf.d/20-customization.part
        kernel:
          modules:
            - name: nvidia
            - name: nvidia_uvm
            - name: nvidia_drm
            - name: nvidia_modeset
        network:
          hostname: t3s-zendo-w4
          interfaces:
