machine:
  network:
    hostname: t3s-zendo-w2
    interfaces:
      - deviceSelector:
          busPath: "0*"
        addresses:
          - 10.96.10.157/24
        routes:
          - network: 0.0.0.0/0
            gateway: 10.96.10.1
        dhcp: false
  files:
    - path: /etc/cri/conf.d/20-customization.part
      op: create
      content: |
        [plugins."io.containerd.cri.v1.runtime"]
          cdi_spec_dirs = ["/var/cdi/static", "/var/cdi/dynamic"]
